<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turşu Çeşitlerimiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#fafaf7;padding:14px}
.header{text-align:center;margin-bottom:14px}
.badge{display:inline-block;background:#e8f5e9;color:#2e7d32;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:6px}
.header h1{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.header p{font-size:12px;color:#777}

/* 3'lü grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.card{background:#fff;border-radius:10px;border:2px solid transparent;overflow:hidden;cursor:pointer;opacity:0;transform:translateY(10px)}
.card.show{opacity:1;transform:translateY(0);transition:opacity .35s,transform .35s}
.card.active{border-color:#4caf50;box-shadow:0 3px 10px rgba(76,175,80,.2)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.card-name{font-size:11px;font-weight:700;color:#222;padding:6px 7px 8px;line-height:1.3}

/* Detay: resim sola, yazı sağa */
.detail{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:12px;display:flex;gap:12px;align-items:flex-start;opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.detail.show{opacity:1;transform:translateY(0)}
.detail img{width:90px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0}
.detail-right{flex:1;min-width:0}
.detail-name{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:5px}
.detail-desc{font-size:12px;color:#555;line-height:1.5;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tag{font-size:10px;padding:3px 8px;border-radius:8px;background:#e8f5e9;color:#2e7d32;font-weight:600}
.btn-buy{display:block;width:100%;padding:10px;border-radius:8px;background:#4caf50;color:#fff;font-size:13px;font-weight:700;text-decoration:none;text-align:center}
.btn-buy:hover{background:#388e3c}
</style>
</head>
<body>
<div class="header">
  <div class="badge">🥒 Çıtır Çıtır</div>
  <h1>Turşu Çeşitlerimiz</h1>
  <p>Tuz ve sirke ile, katkısız ev turşuları</p>
</div>

<div class="grid" id="grid"></div>
<div class="detail" id="detail"></div>

    name: "Karnabahar Turşusu",

const grid=document.getElementById('grid');
const detail=document.getElementById('detail');

function showDetail(i){
  grid.querySelectorAll('.card').forEach((c,j)=>c.classList.toggle('active',j===i));
  const p=PRODUCTS[i];
  detail.classList.remove('show');
  detail.innerHTML=`
    <img src="${p.img}" alt="${p.name}">
    <div class="detail-right">
      <div class="detail-name">${p.name}</div>
      <div class="detail-desc">${p.desc}</div>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <a href="${p.url}" class="btn-buy" target="_top">Satın Al →</a>
    </div>
  `;
  requestAnimationFrame(()=>detail.classList.add('show'));
}

PRODUCTS.forEach((p,i)=>{
  const c=document.createElement('div');
  c.className='card';
  c.innerHTML=`<img src="${p.img}" alt="${p.name}" loading="lazy"><div class="card-name">${p.name}</div>`;
  c.onclick=()=>showDetail(i);
  grid.appendChild(c);
  setTimeout(()=>c.classList.add('show'),60+i*55);
});

setTimeout(()=>showDetail(0),600);
</script>
